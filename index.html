<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ولنتاینم میشی؟</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --rose:     #C4364A;
      --blush:    #F2A8B5;
      --cream:    #FDF6EE;
      --gold:     #C9A84C;
      --midnight: #1A0A10;
      --petal:    #F7D6DC;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--midnight);
      color: var(--cream);
      font-family: 'Vazirmatn', serif;
      min-height: 100vh;
      overflow-x: hidden;
      cursor: none;
    }

    #cursor {
      position: fixed; width: 18px; height: 18px;
      background: var(--rose); border-radius: 50%;
      pointer-events: none; z-index: 9999;
      transform: translate(-50%,-50%);
      transition: transform .15s ease, background .3s;
      mix-blend-mode: screen;
    }

    #petals { position: fixed; inset: 0; pointer-events: none; z-index: 1; }

    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.04'/%3E%3C/svg%3E");
      pointer-events: none; opacity: .35;
    }

    .bg-mesh {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 70% 60% at 20% 30%, #4A0A1A 0%, transparent 65%),
        radial-gradient(ellipse 50% 50% at 80% 70%, #2A0515 0%, transparent 60%),
        radial-gradient(ellipse 80% 80% at 50% 50%, #0D0308 0%, transparent 100%);
    }

    .stage {
      position: relative; z-index: 2;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 3rem 1.5rem;
      text-align: center;
    }

    .ring {
      position: absolute; border-radius: 50%;
      border: 1px solid rgba(196,54,74,.18);
      animation: pulse-ring 6s ease-in-out infinite;
    }
    .ring:nth-child(1){ width:420px; height:420px; animation-delay:0s; }
    .ring:nth-child(2){ width:620px; height:620px; animation-delay:1.5s; }
    .ring:nth-child(3){ width:820px; height:820px; animation-delay:3s; }
    @keyframes pulse-ring {
      0%,100%{ transform:scale(1); opacity:.4; }
      50%    { transform:scale(1.04); opacity:.12; }
    }

    .heart-wrap {
      margin-bottom: 2rem;
      opacity: 0; transform: scale(.6) translateY(30px);
      animation: heart-in 1.2s cubic-bezier(.34,1.56,.64,1) .3s forwards;
    }
    @keyframes heart-in { to { opacity:1; transform:scale(1) translateY(0); } }
    .heart-wrap svg {
      width: 90px; height: 90px;
      filter: drop-shadow(0 0 28px rgba(196,54,74,.7));
      animation: heartbeat 2.4s ease-in-out infinite;
    }
    @keyframes heartbeat {
      0%,100%{ transform:scale(1); }
      14%    { transform:scale(1.15); }
      28%    { transform:scale(1); }
      42%    { transform:scale(1.1); }
      56%    { transform:scale(1); }
    }

    /* ── نمایشگر دفعات رد ── */
    .reject-counter {
      font-size: .75rem; letter-spacing: .15em;
      color: rgba(201,168,76,.5);
      margin-bottom: .6rem; min-height: 1.2rem;
      opacity: 0;
      animation: fade-up .8s ease .7s forwards;
      transition: color .4s;
    }
    .reject-counter.hot { color: var(--gold); }

    .dateline {
      font-size: .8rem; letter-spacing: .2em;
      color: var(--gold);
      opacity: 0;
      animation: fade-up .8s ease .9s forwards;
      margin-bottom: 1.1rem;
    }

    h1 {
      font-family: 'Vazirmatn', sans-serif;
      font-size: clamp(2rem, 6vw, 4.5rem);
      font-weight: 700; line-height: 1.25;
      color: var(--cream);
      opacity: 0;
      animation: fade-up .9s ease 1.1s forwards;
      margin-bottom: .6rem;
    }
    h1 em {
      font-style: normal; color: var(--blush);
      display: block; font-weight: 300;
    }

    /* ── متن پویا (با انیمیشن تغییر) ── */
    .sub {
      font-size: clamp(.95rem, 2.3vw, 1.25rem);
      font-weight: 300; color: rgba(253,246,238,.6);
      max-width: 500px; line-height: 1.9;
      opacity: 0;
      animation: fade-up .9s ease 1.4s forwards;
      margin-bottom: 3rem;
      min-height: 3.5rem;
      transition: opacity .4s ease;
    }
    .sub.changing { opacity: 0 !important; }

    .divider {
      display: flex; align-items: center; gap: 1rem;
      width: 100%; max-width: 320px; margin: 0 auto 2.8rem;
      opacity: 0;
      animation: fade-up .8s ease 1.6s forwards;
    }
    .divider span { flex:1; height:1px; background: linear-gradient(90deg,transparent,var(--gold),transparent); }
    .divider i { font-style: normal; font-size: 1rem; color: var(--gold); }

    .buttons {
      display: flex; gap: 1.2rem; flex-wrap: wrap; justify-content: center;
      opacity: 0;
      animation: fade-up .9s ease 1.8s forwards;
    }
    .btn {
      cursor: none; display: inline-block;
      padding: .85rem 2.5rem; border-radius: 100px;
      font-family: 'Vazirmatn', serif;
      font-size: 1rem; letter-spacing: .04em;
      text-decoration: none; border: none;
      transition: transform .25s, box-shadow .25s, background .25s;
      position: relative; overflow: hidden;
    }
    .btn::after {
      content:''; position:absolute; inset:0; border-radius:inherit;
      background: rgba(255,255,255,.08);
      opacity:0; transition: opacity .25s;
    }
    .btn:hover::after { opacity:1; }
    .btn:hover { transform: translateY(-3px) scale(1.03); }

    .btn-yes {
      background: linear-gradient(135deg, var(--rose) 0%, #8B1A2B 100%);
      color: var(--cream);
      box-shadow: 0 8px 32px rgba(196,54,74,.4), 0 2px 8px rgba(0,0,0,.3);
    }
    .btn-yes:hover { box-shadow: 0 14px 48px rgba(196,54,74,.65), 0 2px 8px rgba(0,0,0,.3); }

    /* ── دکمه رد — اندازه‌اش کم میشه ── */
    .btn-no {
      background: transparent;
      color: var(--petal);
      border: 1px solid rgba(242,168,181,.35) !important;
      box-shadow: inset 0 0 20px rgba(196,54,74,.05);
      transition: transform .25s, box-shadow .25s, font-size .3s, padding .3s, opacity .3s;
    }
    .btn-no:hover { border-color: var(--blush) !important; color: var(--cream); }

    .flourish {
      margin-top: 4rem; font-size: .72rem; letter-spacing: .2em;
      color: rgba(253,246,238,.2);
      opacity: 0; animation: fade-up .8s ease 2.2s forwards;
    }

    @keyframes fade-up {
      from { opacity:0; transform:translateY(22px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* ── مودال ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0; z-index: 100;
      background: rgba(10,2,5,.88);
      backdrop-filter: blur(8px);
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display:flex; }
    .modal {
      background: linear-gradient(145deg,#2A0A14,#160408);
      border: 1px solid rgba(196,54,74,.3);
      border-radius: 20px; padding: 3rem 2.5rem;
      max-width: 400px; width: 90%; text-align: center;
      box-shadow: 0 30px 80px rgba(0,0,0,.6), 0 0 60px rgba(196,54,74,.15);
      animation: pop-in .5s cubic-bezier(.34,1.56,.64,1) forwards;
    }
    @keyframes pop-in {
      from{ transform:scale(.7); opacity:0; }
      to  { transform:scale(1);  opacity:1; }
    }
    .modal h2 {
      font-family:'Vazirmatn',sans-serif;
      font-size:1.7rem; color:var(--blush); margin-bottom:.7rem; font-weight:700;
    }
    .modal p { font-size:1.05rem; color:rgba(253,246,238,.75); line-height:1.9; margin-bottom:1.8rem; }
    .modal .close-btn {
      cursor:none; display:inline-block;
      padding:.7rem 2rem; border-radius:100px;
      background:var(--rose); color:var(--cream);
      font-family:'Vazirmatn',sans-serif; font-size:.95rem;
      border:none; box-shadow:0 6px 24px rgba(196,54,74,.4);
      transition:transform .2s; letter-spacing:.04em;
    }
    .modal .close-btn:hover { transform:scale(1.05); }

    #confetti { position:fixed; inset:0; pointer-events:none; z-index:99; }

    @media(max-width:480px){
      .ring { display:none; }
      .buttons { flex-direction:column; align-items:center; }
      .btn { width:220px; text-align:center; }
    }
  </style>
</head>

</div>

    subText: 'تسلیم شدم... ولی قلبم هنوز پیشته. هر وقت نظرت عوض شد، یه پیام بده. من اینجام.',
    btnNo: 'هرگز!',
    btnNoSize: '.4rem',
    noTitle: 'هرگز؟! 🥲',
    noText: '«هرگز» یه کلمه بزرگه... ولی باشه. من اینجام. صبورم. همیشه.',
  },
  // ۱۴
  {
    counter: '(۱۴ بار! تاریخ رو عوض کردی 📅)',
    dateline: 'آخرین پیام',
    title: 'یه روز',
    sub2: 'یادت میاد 💭',
    subText: 'یه روز توی یه کافه میشینی، یه آهنگ قدیمی پخش میشه، و یادت میاد یکی خیلی سعی کرد. اون منم.',
    btnNo: 'خداحافظ!',
    btnNoSize: '.38rem',
    noTitle: 'خداحافظ؟ 🚶',
    noText: '...ولی می‌دونم که برمیگردی. این صفحه همیشه اینجاست. ♡',
  },
];

let rejectCount = 0;

function getStage(n) {
  if (n >= stages.length) return stages[stages.length - 1];
  return stages[n];
}

function applyStage(n, animate = false) {
  const s = getStage(n);
  const subEl = document.getElementById('subText');

  if (animate) {
    subEl.classList.add('changing');
    setTimeout(() => {
      document.getElementById('rejectCounter').textContent = s.counter;
      document.getElementById('rejectCounter').className = 'reject-counter' + (n >= 3 ? ' hot' : '');
      document.getElementById('dateline').textContent = s.dateline;
      document.getElementById('mainTitle').childNodes[0].textContent = s.title;
      document.getElementById('mainSub').textContent = s.sub2;
      subEl.textContent = s.subText;
      subEl.classList.remove('changing');

      const btnNo = document.getElementById('btnNo');
      btnNo.textContent = s.btnNo;
      btnNo.style.fontSize = s.btnNoSize;
      // کوچیک‌تر کردن تدریجی دکمه رد
      const scale = Math.max(0.5, 1 - n * 0.08);
      btnNo.style.transform = `scale(${scale})`;
      btnNo.style.opacity = Math.max(0.4, 1 - n * 0.1);
    }, 350);
  } else {
    document.getElementById('rejectCounter').textContent = s.counter;
    document.getElementById('mainTitle').childNodes[0].textContent = s.title;
    document.getElementById('mainSub').textContent = s.sub2;
    subEl.textContent = s.subText;
    document.getElementById('btnNo').textContent = s.btnNo;
  }
}

/* ── رد کردن ── */
function sayNo() {
  rejectCount++;
  const s = getStage(rejectCount);

  // نمایش مودال رد
  document.getElementById('noTitle').textContent = s.noTitle;
  document.getElementById('noText').textContent  = s.noText;
  document.getElementById('noModal').classList.add('open');

  // لرزش صفحه
  document.body.style.animation = 'none';
  document.querySelector('.stage').style.animation = 'shake .4s ease';
  setTimeout(() => document.querySelector('.stage').style.animation = '', 400);

  // بعد از بستن مودال، متن‌ها تغییر می‌کنن
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
  if (id === 'noModal') {
    applyStage(rejectCount, true);
  }
}

/* ── بله گفتن ── */
function sayYes() {
  document.getElementById('yesModal').classList.add('open');
  launchConfetti();
}

/* ── لرزش برای رد ── */
const styleTag = document.createElement('style');
styleTag.textContent = `@keyframes shake {
  0%,100%{transform:translateX(0);}
  20%{transform:translateX(-8px);}
  40%{transform:translateX(8px);}
  60%{transform:translateX(-6px);}
  80%{transform:translateX(6px);}
}`;
document.head.appendChild(styleTag);

/* ── Cursor ── */
const cur = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
  cur.style.left = e.clientX + 'px';
  cur.style.top  = e.clientY + 'px';
});
document.querySelectorAll('.btn,.close-btn').forEach(el => {
  el.addEventListener('mouseenter', () => cur.style.transform = 'translate(-50%,-50%) scale(2.2)');
  el.addEventListener('mouseleave', () => cur.style.transform = 'translate(-50%,-50%) scale(1)');
});

/* ── گلبرگ‌های ریزان ── */
const pc = document.getElementById('petals');
const px = pc.getContext('2d');
pc.width = window.innerWidth; pc.height = window.innerHeight;
window.addEventListener('resize', () => { pc.width = window.innerWidth; pc.height = window.innerHeight; });
const petals = Array.from({length:28}, () => ({
  x: Math.random()*pc.width, y: Math.random()*pc.height - pc.height,
  r: 4+Math.random()*6, vx:(Math.random()-.5)*.6, vy:.4+Math.random()*.7,
  angle: Math.random()*Math.PI*2, va:(Math.random()-.5)*.03,
  alpha:.3+Math.random()*.5,
  color: ['#C4364A','#E8758A','#F2A8B5','#C9A84C','#F7D6DC'][Math.floor(Math.random()*5)]
}));
function animPetals() {
  px.clearRect(0,0,pc.width,pc.height);
  petals.forEach(p => {
    p.x+=p.vx; p.y+=p.vy; p.angle+=p.va;
    if(p.y>pc.height+20){p.y=-20;p.x=Math.random()*pc.width;}
    px.save(); px.globalAlpha=p.alpha; px.translate(p.x,p.y); px.rotate(p.angle);
    px.beginPath(); px.ellipse(0,0,p.r*.55,p.r,0,0,Math.PI*2);
    px.fillStyle=p.color; px.fill(); px.restore();
  });
  requestAnimationFrame(animPetals);
}
animPetals();

/* ── کانفتی ── */
const cc = document.getElementById('confetti');
const cx = cc.getContext('2d');
cc.width = window.innerWidth; cc.height = window.innerHeight;
window.addEventListener('resize',()=>{cc.width=window.innerWidth;cc.height=window.innerHeight;});
let confettiPieces=[], confettiRunning=false;
function launchConfetti() {
  confettiPieces = Array.from({length:140},()=>({
    x:window.innerWidth/2, y:window.innerHeight/2,
    vx:(Math.random()-.5)*16, vy:-7-Math.random()*11,
    r:5+Math.random()*7, angle:Math.random()*360, va:(Math.random()-.5)*9,
    color:['#C4364A','#F2A8B5','#C9A84C','#FDF6EE','#E84060','#F7D6DC'][Math.floor(Math.random()*6)],
    gravity:.25+Math.random()*.2, alpha:1, shape:Math.random()>.5?'circle':'rect'
  }));
  confettiRunning=true; animConfetti();
}
function animConfetti() {
  if(!confettiRunning){cx.clearRect(0,0,cc.width,cc.height);return;}
  cx.clearRect(0,0,cc.width,cc.height);
  let alive=false;
  confettiPieces.forEach(p=>{
    if(p.alpha<=0)return; alive=true;
    p.vy+=p.gravity;p.x+=p.vx;p.y+=p.vy;p.angle+=p.va;p.alpha-=.006;
    cx.save();cx.globalAlpha=Math.max(0,p.alpha);
    cx.translate(p.x,p.y);cx.rotate(p.angle*Math.PI/180);
    cx.fillStyle=p.color;
    if(p.shape==='circle'){cx.beginPath();cx.arc(0,0,p.r/2,0,Math.PI*2);cx.fill();}
    else{cx.fillRect(-p.r/2,-p.r/4,p.r,p.r/2);}
    cx.restore();
  });
  if(alive)requestAnimationFrame(animConfetti);
  else{confettiRunning=false;cx.clearRect(0,0,cc.width,cc.height);}
}

document.querySelectorAll('.modal-overlay').forEach(el=>
  el.addEventListener('click',e=>{if(e.target===el)closeModal(el.id);})
);
</script>
</body>
